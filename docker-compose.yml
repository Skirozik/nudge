services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nudge
      POSTGRES_PASSWORD: nudge
      POSTGRES_DB: nudge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nudge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: npx prisma migrate deploy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nudge:nudge@postgres:5432/nudge
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: .
    command: npm run start
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nudge:nudge@postgres:5432/nudge
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    command: npm run worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nudge:nudge@postgres:5432/nudge
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
